site_name: Armature
site_description: Opinionated NestJS boilerplate — Prisma, JWT auth, RBAC, typed errors, i18n, optional Redis/BullMQ, Stripe and Google OAuth.
site_url: https://turoyt.github.io/Armature
repo_url: https://github.com/TuroYT/Armature
repo_name: TuroYT/Armature

theme:
  name: material
  logo: logo.png
  favicon: logo.png
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture: architecture.md
  - Authentication: authentication.md
  - RBAC: rbac.md
  - Logger: logger.md
  - Optional Modules: optional-modules.md
  - Error Codes & i18n: error-codes.md
  - Adding a Social Provider: adding-social-provider.md
